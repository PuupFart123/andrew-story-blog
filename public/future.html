<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Future - Andrew's Story Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="gradient-bg">
  <canvas id="mesh-gradient-canvas"></canvas>

  <header class="site-header">
    <a class="site-title" href="index.html">Andrew's Story Blog</a>
    <nav class="site-nav">
      <a class="nav-pill" href="books.html">Books</a>
      <a class="nav-pill" href="movies.html">Movies</a>
      <a class="nav-pill" href="short-stories-ranking.html">Short Stories</a>
      <a class="nav-pill" href="mailing-list.html">EQ's Mailing List</a>
    </nav>
  </header>

  <section class="page-heading">
    <h1>Future Watches &amp; Reads</h1>
    <p>Things that you think Andrew (or anyone else!) should get to at one point.</p>
  </section>

  <div class="public-form-panel" id="future-form-panel">
    <h3>Add something to the list</h3>
    <form id="future-form">
      <div class="field">
        <label for="future-category">Type</label>
        <select id="future-category" name="category" required>
          <option value="book">Book</option>
          <option value="movie">Movie</option>
        </select>
      </div>
      <div class="field">
        <label for="future-title">Title</label>
        <input id="future-title" name="title" type="text" required />
      </div>
      <div class="field" id="future-entered-by-field">
        <label for="future-entered-by">Your name (code names welcome. Put something that you think <i>might</i> make you recognizable.)</label>
        <input id="future-entered-by" name="enteredBy" type="text" placeholder="e.g. The skibidizer" required />
      </div>
      <div class="modal-error" id="future-error"></div>
      <button type="submit" class="btn">Add to the list</button>
    </form>
  </div>

  <section class="ranking-list" id="future-list">
    <p class="empty-state">Loading...</p>
  </section>

  <script src="/js/main.js"></script>
  <script src="/js/future.js"></script>
  <script src="/js/mesh-gradient.js"></script>
</body>
</html>
