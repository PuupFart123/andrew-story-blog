<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EQ's Mailing List - Andrew's Story Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="gradient-bg">
  <canvas id="mesh-gradient-canvas"></canvas>

  <header class="site-header">
    <a class="site-title" href="index.html">Andrew's Story Blog</a>
    <nav class="site-nav">
      <a class="nav-pill" href="books.html">Books</a>
      <a class="nav-pill" href="movies.html">Movies</a>
      <a class="nav-pill" href="short-stories-ranking.html">Short Stories</a>
      <a class="nav-pill" href="mailing-list.html">EQ's Mailing List</a>
    </nav>
  </header>

  <section class="page-heading">
    <h1>EQ's Mailing List</h1>
    <p>Get an email the moment a new book or movie review posts.</p>
  </section>

  <div class="public-form-panel" id="subscribe-form-panel">
    <h3>Subscribe</h3>
    <form id="subscribe-form">
      <div class="field">
        <label for="subscribe-email">Email</label>
        <input id="subscribe-email" name="email" type="email" placeholder="you@email.com" required />
      </div>
      <div class="modal-error" id="subscribe-error"></div>
      <span class="subscribe-message" id="subscribe-message"></span>
      <button type="submit" class="btn">Subscribe</button>
    </form>
  </div>

  <script src="/js/main.js"></script>
  <script src="/js/subscribe.js"></script>
  <script src="/js/mesh-gradient.js"></script>
</body>
</html>
